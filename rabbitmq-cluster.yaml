# =============================================================================
# RabbitmqCluster CR — The RabbitMQ instance itself
# =============================================================================
# This MUST be applied (and reconciled) before the Vhost and all topology CRs.
# The RabbitMQ Cluster Operator creates the StatefulSet, Services, and Secrets.
#
# Sync order (ArgoCD sync-waves):
#   -2  RabbitmqCluster (this file)
#   -1  Vhost
#    0  Exchanges, Queues, Bindings, Policies, Users, Permissions
#
# PLACEHOLDER: Replace "gp3-csi" with your StorageClass if different.
# =============================================================================

---
apiVersion: rabbitmq.com/v1beta1
kind: RabbitmqCluster
metadata:
  name: queue
  namespace: queue
  labels:
    app.kubernetes.io/part-of: opl
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  replicas: 1

  persistence:
    storageClassName: gp3-csi
    storage: 30Gi

  resources:
    requests:
      cpu: 250m
      memory: 2Gi
    limits:
      cpu: "1"
      memory: 2Gi

  rabbitmq:
    additionalPlugins:
      - rabbitmq_shovel
      - rabbitmq_shovel_management
    additionalConfig: |
      default_queue_type = quorum
      vm_memory_high_watermark.relative = 0.8

  service:
    type: ClusterIP

  # OpenShift requires resetting securityContext to {} so it can assign
  # arbitrary UIDs from the namespace's allocated range.
  # See: https://www.rabbitmq.com/kubernetes/operator/using-on-openshift
  override:
    statefulSet:
      spec:
        template:
          spec:
            securityContext: {}
            initContainers:
              - name: setup-container
                securityContext: {}
            containers:
              - name: rabbitmq
                securityContext: {}
