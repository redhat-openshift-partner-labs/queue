# =============================================================================
# Kustomize base — RabbitMQ Messaging Topology
# =============================================================================
# Usage:
#   kustomize build overlays/dev | oc apply -f -
#   kustomize build overlays/prod | oc apply -f -
#
# Or via gitops-controller application pointing at overlays/{env}
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: queue

resources:
  - rabbitmq-cluster.yaml              # must sync first (sync-wave: -2)
  - rabbitmq-vhost.yaml                # sync-wave: -1
  - rabbitmq-topology-manifests.yaml
  - rabbitmq-users-permissions.yaml
