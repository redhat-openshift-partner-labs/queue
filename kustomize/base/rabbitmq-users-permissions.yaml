# ─────────────────────────────────────────────────────────────────────────────
# worker-notification — consumes notification queues + handoff welcome-email
# ─────────────────────────────────────────────────────────────────────────────

---
apiVersion: rabbitmq.com/v1beta1
kind: User
metadata:
  name: user-worker-notification
  namespace: opl-system
  labels:
    app.kubernetes.io/part-of: opl
    opl.io/component: worker-notification
spec:
  tags: []
  rabbitmqClusterReference:
    name: opl-rabbitmq

---
apiVersion: rabbitmq.com/v1beta1
kind: Permission
metadata:
  name: perm-worker-notification
  namespace: opl-system
  labels:
    app.kubernetes.io/part-of: opl
    opl.io/component: worker-notification
spec:
  vhost: opl
  userReference:
    name: user-worker-notification
  permissions:
    configure: ""
    # Publishes to notify exchange (notification.sent/failed) and handoff (welcome-email.sent/failed)
    write: "^opl\\.(notify|handoff)$"
    # Consumes all notify.* queues + approval-required + handoff welcome-email.send
    read: "^(notify\\.(user|admin)\\.[a-z-]+|lab\\.provision\\.pr\\.approval-required|handoff\\.welcome-email\\.send)$"
  rabbitmqClusterReference:
    name: opl-rabbitmq
