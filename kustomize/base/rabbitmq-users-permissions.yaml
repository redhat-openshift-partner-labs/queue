# =============================================================================
# RabbitMQ Users & Permissions — Per-Component Least Privilege
# =============================================================================
# Generated from REFERENCE.md component inventory.
#
# Each component gets:
#   - A User CR (credentials auto-generated, stored in K8s Secret)
#   - A Permission CR scoped to the exact queue/exchange patterns it needs
#
# Permission regex patterns follow the principle:
#   configure = can declare/delete (empty = none)
#   write     = can publish to
#   read      = can consume from
#
# PLACEHOLDER: Replace "opl-rabbitmq" with your RabbitmqCluster name.
# PLACEHOLDER: Replace "opl-system" with your namespace.
#
# NOTE: If using the Kustomize overlays, place this file in base/ and add
#       it to the resources list in base/kustomization.yaml.
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# workflow-engine — publishes to intake.raw only
# ─────────────────────────────────────────────────────────────────────────────

---
apiVersion: rabbitmq.com/v1beta1
kind: User
metadata:
  name: user-workflow-engine
  namespace: opl-system
  labels:
    app.kubernetes.io/part-of: opl
    opl.io/component: workflow-engine
spec:
  tags: []    # no management UI access
  rabbitmqClusterReference:
    name: opl-rabbitmq

---
apiVersion: rabbitmq.com/v1beta1
kind: Permission
metadata:
  name: perm-workflow-engine
  namespace: opl-system
  labels:
    app.kubernetes.io/part-of: opl
    opl.io/component: workflow-engine
spec:
  vhost: opl
  userReference:
    name: user-workflow-engine
  permissions:
    configure: ""                          # cannot declare anything
    write: "^opl\\.intake$"                # publish to intake exchange only
    read: ""                               # does not consume
  rabbitmqClusterReference:
    name: opl-rabbitmq

# ─────────────────────────────────────────────────────────────────────────────
# worker-etl — consumes intake.raw, publishes intake.normalized + intake.raw.failed
# ─────────────────────────────────────────────────────────────────────────────

---
apiVersion: rabbitmq.com/v1beta1
kind: User
metadata:
  name: user-worker-etl
  namespace: opl-system
  labels:
    app.kubernetes.io/part-of: opl
    opl.io/component: worker-etl
spec:
  tags: []
  rabbitmqClusterReference:
    name: opl-rabbitmq

---
apiVersion: rabbitmq.com/v1beta1
kind: Permission
metadata:
  name: perm-worker-etl
  namespace: opl-system
  labels:
    app.kubernetes.io/part-of: opl
    opl.io/component: worker-etl
spec:
  vhost: opl
  userReference:
    name: user-worker-etl
  permissions:
    configure: ""
    write: "^opl\\.intake$"                # publishes normalized + failed via exchange
    read: "^intake\\.raw$"                 # consumes from intake.raw queue
  rabbitmqClusterReference:
    name: opl-rabbitmq

# ─────────────────────────────────────────────────────────────────────────────
# scribe — the saga orchestrator. Consumes from many queues, publishes to many.
# Broadest permissions of any component.
# ─────────────────────────────────────────────────────────────────────────────

---
apiVersion: rabbitmq.com/v1beta1
kind: User
metadata:
  name: user-scribe
  namespace: opl-system
  labels:
    app.kubernetes.io/part-of: opl
    opl.io/component: scribe
spec:
  tags:
    - monitoring      # allow management UI read-only for debugging
  rabbitmqClusterReference:
    name: opl-rabbitmq

---
apiVersion: rabbitmq.com/v1beta1
kind: Permission
metadata:
  name: perm-scribe
  namespace: opl-system
  labels:
    app.kubernetes.io/part-of: opl
    opl.io/component: scribe
spec:
  vhost: opl
  userReference:
    name: user-scribe
  permissions:
    configure: ""
    # Publishes to all domain exchanges
    write: "^opl\\.(intake|provision|deprovision|day1|day2|handoff|notify)$"
    # Consumes from normalized, dispatch responses, prov status, day1/day2/handoff results, notifications
    read: "^(intake\\.(normalized|raw\\.failed|dispatch\\.(provision|review|provision-after-review|rejected))|lab\\.(provision\\.(manifests-complete|pr\\.(checks-running|checks-passed|checks-failed|merged)|cluster-(installing|ready|failed))|deprovision\\.(archive-complete|pr\\.merged|cluster-(removing|removed)|failed)|day1\\.(insights|oauth-hub|oauth-spoke|kubeadmin|rbac|ssl)\\.(complete|failed)|day1\\.(complete|failed)|day2\\.task\\.(complete|failed)|day2\\.(complete|failed))|handoff\\.(cluster-ready|credentials\\.(complete|failed)|welcome-email\\.(sent|failed)|complete)|notification\\.(sent|failed))$"
  rabbitmqClusterReference:
    name: opl-rabbitmq

# ─────────────────────────────────────────────────────────────────────────────
# messenger — Slack bot. Consumes dispatch notifications, publishes dispatch decisions.
# ─────────────────────────────────────────────────────────────────────────────

---
apiVersion: rabbitmq.com/v1beta1
kind: User
metadata:
  name: user-messenger
  namespace: opl-system
  labels:
    app.kubernetes.io/part-of: opl
    opl.io/component: messenger
spec:
  tags: []
  rabbitmqClusterReference:
    name: opl-rabbitmq

---
apiVersion: rabbitmq.com/v1beta1
kind: Permission
metadata:
  name: perm-messenger
  namespace: opl-system
  labels:
    app.kubernetes.io/part-of: opl
    opl.io/component: messenger
spec:
  vhost: opl
  userReference:
    name: user-messenger
  permissions:
    configure: ""
    # Publishes dispatch decisions + handoff.cluster-ready back to intake/handoff exchanges
    write: "^opl\\.(intake|handoff)$"
    # Consumes FYI, review-requested, handoff day1-complete-notify, handoff.complete
    read: "^(intake\\.dispatch\\.(notify-fyi|review-requested)|handoff\\.(day1-complete-notify|complete))$"
  rabbitmqClusterReference:
    name: opl-rabbitmq

