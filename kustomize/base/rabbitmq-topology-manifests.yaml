metadata:
  name: ex-intake
  namespace: opl-system
  labels:
    app.kubernetes.io/part-of: opl
    opl.io/domain: intake
spec:
  name: opl.intake
  vhost: opl
  type: topic
  durable: true
  autoDelete: false
  rabbitmqClusterReference:
    name: opl-rabbitmq

