# ─────────────────────────────────────────────────────────────────────────────
# EXCHANGES
# ─────────────────────────────────────────────────────────────────────────────
# Routing model: one topic exchange per domain. Producers publish with
# routing key = queue name (e.g. "intake.raw"). Consumers bind with exact
# routing key. This gives per-domain observability and lets you add
# wildcard consumers later (e.g. "intake.#" for audit logging).
# ─────────────────────────────────────────────────────────────────────────────

---
