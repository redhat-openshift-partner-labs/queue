# ─────────────────────────────────────────────────────────────────────────────
# POLICIES
# ─────────────────────────────────────────────────────────────────────────────
# Policies are the recommended way to manage queue arguments at scale.
# They apply at runtime and can be updated without recreating queues.
# The per-queue x-* arguments above act as initial defaults; policies override.
# ─────────────────────────────────────────────────────────────────────────────

---
# Policy: DLQ message TTL — expire poison messages in DLQs after 30 days
# so they don't accumulate indefinitely. Ops should drain/investigate sooner.
apiVersion: rabbitmq.com/v1beta1
kind: Policy
metadata:
  name: pol-dlq-ttl
  namespace: opl-system
  labels:
    app.kubernetes.io/part-of: opl
    opl.io/domain: dlq
spec:
  name: opl-dlq-ttl
  vhost: opl
  pattern: "^dlq\\."
  applyTo: queues
  priority: 0
  definition:
    message-ttl: 2592000000    # 30 days in ms
  rabbitmqClusterReference:
    name: opl-rabbitmq

# ─────────────────────────────────────────────────────────────────────────────
# TTL TIERING STRATEGY
# ─────────────────────────────────────────────────────────────────────────────
# RabbitMQ applies ONE policy per queue (highest priority match wins).
# Therefore every TTL policy must also carry delivery-limit and DLX config,
# otherwise those properties would be lost when the TTL policy takes precedence
# over a lower-priority delivery-limit-only policy.
#
# Tiers:
#
#   TIER 1 — Status/event queues (24h / 86400000 ms)
#     Pattern: *.complete, *.failed, *.sent, *.installing, *.ready, *.removing,
#              *.removed, notification.sent, notification.failed
#     Why 24h: These are state-change notifications. If the consumer hasn't
#     processed them within a day, the cluster state has already moved on.
#     Replaying a stale "cluster-installing" when it's already been ready for
#     20 hours would be confusing at best.
#
#   TIER 2 — Task/command queues (72h / 259200000 ms)
#     Pattern: *.orchestrate, *.generate-manifests, *.requested, *.create,
#              *.set, *.patch, *.configure, *.execute, *.send, *.disable,
#              intake.raw, intake.normalized
#     Why 72h: These are imperative work orders. Missing one means work
#     doesn't happen. 72h gives ops a full weekend to notice and fix a dead
#     consumer before the command expires and dead-letters.
#
#   TIER 3 — Human-gated/dispatch queues (168h / 7 days / 604800000 ms)
#     Pattern: intake.dispatch.*, handoff.cluster-ready, handoff.day1-complete-notify
#     Why 7 days: These involve human decisions (Slack buttons, review,
#     /cluster ready). Humans are slow. PTO, weekends, async review cycles.
#
# Priority ordering: tier-specific (priority 10) > DLQ TTL (priority 0).
# A catch-all safety net at priority 0 handles any queue that doesn't match
# a tier pattern, ensuring no queue runs without delivery-limit + DLX.
# ─────────────────────────────────────────────────────────────────────────────

---
# TIER 1: Status/event queues — 24h TTL
# Matches: *.complete, *.failed, *.sent, *.installing, *.ready, *.removing,
#          *.removed, *.merged, *.running, *.passed (dot or hyphen delimited),
#          plus all notify.* and notification.* queues
apiVersion: rabbitmq.com/v1beta1
kind: Policy
metadata:
  name: pol-ttl-status-24h
  namespace: opl-system
  labels:
    app.kubernetes.io/part-of: opl
    opl.io/ttl-tier: status
spec:
  name: opl-ttl-status-24h
  vhost: opl
  pattern: "(\\.(complete|failed|sent|installing|ready|removing|removed|merged|running|passed)$|-(complete|failed|installing|ready|removing|removed|passed|running|required)$|^notify\\.|^notification\\.)"
  applyTo: quorum_queues
  priority: 10
  definition:
    message-ttl: 86400000          # 24 hours in ms
    delivery-limit: 5
    dead-letter-exchange: opl.dlx
  rabbitmqClusterReference:
    name: opl-rabbitmq

---
# TIER 2: Task/command queues — 72h TTL
# Matches: intake.raw, intake.normalized, *.orchestrate, *.generate-manifests,
#          *.requested, *.create, *.set, *.patch, *.configure, *.execute,
#          *.send, *.disable
apiVersion: rabbitmq.com/v1beta1
kind: Policy
metadata:
  name: pol-ttl-task-72h
  namespace: opl-system
  labels:
    app.kubernetes.io/part-of: opl
    opl.io/ttl-tier: task
spec:
  name: opl-ttl-task-72h
  vhost: opl
  pattern: "(^intake\\.(raw|normalized)$|\\.(orchestrate|generate-manifests|requested|create|set|patch|configure|execute|send|disable)$)"
  applyTo: quorum_queues
  priority: 10
  definition:
    message-ttl: 259200000         # 72 hours in ms
    delivery-limit: 5
    dead-letter-exchange: opl.dlx
  rabbitmqClusterReference:
    name: opl-rabbitmq

---
# TIER 3: Human-gated/dispatch queues — 7 day TTL
# Matches: intake.dispatch.*, handoff.cluster-ready, handoff.day1-complete-notify
# Priority 11 beats T1/T2 (priority 10) for handoff.cluster-ready which also
# matches the T1 "ready" suffix. More-specific human-gated classification wins.
apiVersion: rabbitmq.com/v1beta1
kind: Policy
metadata:
  name: pol-ttl-dispatch-7d
  namespace: opl-system
  labels:
    app.kubernetes.io/part-of: opl
    opl.io/ttl-tier: dispatch
spec:
  name: opl-ttl-dispatch-7d
  vhost: opl
  pattern: "^(intake\\.dispatch\\.|handoff\\.(cluster-ready|day1-complete-notify))"
  applyTo: quorum_queues
  priority: 11
  definition:
    message-ttl: 604800000         # 7 days in ms
    delivery-limit: 5
    dead-letter-exchange: opl.dlx
  rabbitmqClusterReference:
    name: opl-rabbitmq

---
# SAFETY NET: Catch-all delivery-limit + DLX for any queue not matched above.
# Priority 0 — tier policies at priority 10 take precedence where they match.
# This ensures no application queue runs unbounded even if a new queue name is
# added that doesn't fit an existing tier pattern.
apiVersion: rabbitmq.com/v1beta1
kind: Policy
metadata:
  name: pol-default-delivery-limit
  namespace: opl-system
  labels:
    app.kubernetes.io/part-of: opl
spec:
  name: opl-default-delivery-limit
  vhost: opl
  pattern: "^(intake\\.|lab\\.|handoff\\.|notify\\.|notification\\.)"
  applyTo: quorum_queues
  priority: 0
  definition:
    delivery-limit: 5
    dead-letter-exchange: opl.dlx
  rabbitmqClusterReference:
    name: opl-rabbitmq
