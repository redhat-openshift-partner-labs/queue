---
# Dead-letter exchange — fanout so any DLQ-routed message lands regardless of
# routing key. Individual queues use x-dead-letter-routing-key to target the
# correct DLQ.
apiVersion: rabbitmq.com/v1beta1
kind: Exchange
metadata:
  name: ex-dlx
  namespace: opl-system
  labels:
    app.kubernetes.io/part-of: opl
    opl.io/domain: dlq
spec:
  name: opl.dlx
  vhost: opl
  type: topic
  durable: true
  autoDelete: false
  rabbitmqClusterReference:
    name: opl-rabbitmq

