# =============================================================================
# Dev overlay — lighter delivery limits, shorter DLQ TTL
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: queue
nameSuffix: "-dev"

resources:
  - ../../base

# --- Override the RabbitmqCluster name for this environment ---
# Kustomize replacements rewrite every rabbitmqClusterReference.name field.
# Change the value below to match your dev RabbitmqCluster CR name.
replacements:
  - source:
      kind: ConfigMap
      name: cluster-config
      fieldPath: data.clusterName
    targets:
      - select:
          kind: Queue
        fieldPaths:
          - spec.rabbitmqClusterReference.name
      - select:
          kind: Exchange
        fieldPaths:
          - spec.rabbitmqClusterReference.name
      - select:
          kind: Binding
        fieldPaths:
          - spec.rabbitmqClusterReference.name
      - select:
          kind: Policy
        fieldPaths:
          - spec.rabbitmqClusterReference.name
      - select:
          kind: User
        fieldPaths:
          - spec.rabbitmqClusterReference.name
      - select:
          kind: Permission
        fieldPaths:
          - spec.rabbitmqClusterReference.name
      - select:
          kind: Vhost
        fieldPaths:
          - spec.rabbitmqClusterReference.name

# ConfigMap used only as a Kustomize variable source — not deployed.
# The generator creates it in-memory for the replacements above.
configMapGenerator:
  - name: cluster-config
    literals:
      - clusterName=queue-dev
    options:
      disableNameSuffixHash: true

labels:
  - includeSelectors: true
    pairs:
      opl.io/environment: dev