# =============================================================================
# Staging overlay — targets the existing queue-dev RabbitmqCluster in the
# staging namespace. Use this for development/testing before promoting to prod.
#
# Prerequisites: a RabbitmqCluster named queue-dev must exist in staging,
# or let this overlay create/reconcile it.
#
# Usage:
#   kustomize build kustomize/overlays/staging | oc apply -f -
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging

resources:
  - ../../base

# Rename the RabbitmqCluster CR from "queue" (base default) to "queue-dev"
# to match the existing instance in the staging namespace.
patches:
  - patch: |-
      - op: replace
        path: /metadata/name
        value: queue-dev
    target:
      kind: RabbitmqCluster

# Rewrite every rabbitmqClusterReference.name to point at queue-dev.
replacements:
  - source:
      kind: ConfigMap
      name: cluster-config
      fieldPath: data.clusterName
    targets:
      - select:
          kind: Queue
        fieldPaths:
          - spec.rabbitmqClusterReference.name
      - select:
          kind: Exchange
        fieldPaths:
          - spec.rabbitmqClusterReference.name
      - select:
          kind: Binding
        fieldPaths:
          - spec.rabbitmqClusterReference.name
      - select:
          kind: Policy
        fieldPaths:
          - spec.rabbitmqClusterReference.name
      - select:
          kind: User
        fieldPaths:
          - spec.rabbitmqClusterReference.name
      - select:
          kind: Permission
        fieldPaths:
          - spec.rabbitmqClusterReference.name
      - select:
          kind: Vhost
        fieldPaths:
          - spec.rabbitmqClusterReference.name

configMapGenerator:
  - name: cluster-config
    literals:
      - clusterName=queue-dev
    options:
      disableNameSuffixHash: true

labels:
  - includeSelectors: true
    pairs:
      opl.io/environment: staging