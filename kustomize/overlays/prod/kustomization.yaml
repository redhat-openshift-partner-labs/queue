# =============================================================================
# Prod overlay — production RabbitmqCluster, stricter labels
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: queue

resources:
  - ../../base

replacements:
  - source:
      kind: ConfigMap
      name: cluster-config
      fieldPath: data.clusterName
    targets:
      - select:
          kind: Queue
        fieldPaths:
          - spec.rabbitmqClusterReference.name
      - select:
          kind: Exchange
        fieldPaths:
          - spec.rabbitmqClusterReference.name
      - select:
          kind: Binding
        fieldPaths:
          - spec.rabbitmqClusterReference.name
      - select:
          kind: Policy
        fieldPaths:
          - spec.rabbitmqClusterReference.name
      - select:
          kind: User
        fieldPaths:
          - spec.rabbitmqClusterReference.name
      - select:
          kind: Permission
        fieldPaths:
          - spec.rabbitmqClusterReference.name
      - select:
          kind: Vhost
        fieldPaths:
          - spec.rabbitmqClusterReference.name

configMapGenerator:
  - name: cluster-config
    literals:
      # ── CHANGE THIS to your production RabbitmqCluster CR name ──
      - clusterName=queue
    options:
      disableNameSuffixHash: true

labels:
  - includeSelectors: true
    pairs:
      opl.io/environment: prod
